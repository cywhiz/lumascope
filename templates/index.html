<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumaScope — Professional Insights</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(35, 35, 37, 0.7);
            --card-bg-hover: rgba(45, 45, 47, 0.9);
            --text-main: #f5f5f7;
            --text-muted: #86868b;
            --accent-blue: #0071e3;
            --accent-blue-bright: #2997ff;
            --accent-red: #ff453a;
            --border-color: rgba(255, 255, 255, 0.12);
            --card-w: 400px;
            --radius-main: 22px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #000;
            color: var(--text-main);
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* --- Animated Background --- */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        .bg-glow::before,
        .bg-glow::after,
        .bg-orb {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
        }

        .bg-glow::before {
            width: 600px;
            height: 600px;
            background: var(--accent-blue);
            top: -200px;
            left: -100px;
            animation: float 20s infinite alternate;
        }

        .bg-glow::after {
            width: 500px;
            height: 500px;
            background: #bf5af2;
            bottom: -150px;
            right: -100px;
            animation: float 25s infinite alternate-reverse;
        }

        .bg-orb {
            width: 400px;
            height: 400px;
            background: #30d158;
            top: 40%;
            left: 60%;
            animation: float 22s infinite alternate;
            opacity: 0.1;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 50px) scale(1.1);
            }
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
        }

        /* --- Dynamic Navbar --- */
        .navbar {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: saturate(180%) blur(20px);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);

            /* Hidden initially in Hero Mode */
            opacity: 0;
            pointer-events: none;
            transform: translateY(-20px);
        }

        /* Visible Navbar State */
        .navbar.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .navbar .search-controls {
            margin-left: auto;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-box {
            width: 34px;
            height: 34px;
            background: #000;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .logo-iris {
            width: 18px;
            height: 18px;
            border: 2px solid var(--accent-blue);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 10px rgba(41, 151, 255, 0.4);
        }

        .logo-iris::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            box-shadow: 0 0 5px #fff;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 20px;
            color: #fff;
            letter-spacing: -0.02em;
            white-space: nowrap;
        }

        .hero-logo-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 24px;
            margin-bottom: 48px;
            transition: all 0.5s ease;
        }

        .hero-logo-box {
            width: 80px;
            height: 80px;
            background: #000;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .hero-logo-box::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
        }

        .hero-logo-iris {
            width: 48px;
            height: 48px;
            border: 5px solid var(--accent-blue);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 30px rgba(41, 151, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-logo-iris::after {
            content: '';
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 5px;
            left: 5px;
            box-shadow: 0 0 15px #fff;
        }

        .hero-logo-text {
            font-size: 64px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.04em;
            text-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            margin-bottom: 0;
        }

        .main-content {
            padding: 40px 32px 80px;
            transition: padding 0.3s;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- UI Stats & Divider --- */
        .listing-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto 18px;
            padding: 0;
        }

        #listing-count {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-blue);
            background: rgba(41, 151, 255, 0.1);
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid rgba(41, 151, 255, 0.2);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .ui-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15) 50%, transparent);
            max-width: 1100px;
            margin: 0 auto 24px;
            opacity: 0.8;
        }

        /* --- Filter Section --- */
        .results-controls {
            max-width: 1100px;
            margin: 0 auto 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.035);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
        }

        .controls-primary {
            display: grid;
            grid-template-columns: minmax(260px, 1fr) minmax(180px, 210px) auto;
            gap: 14px;
            align-items: end;
            padding: 18px;
        }

        .toolbar-field {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .toolbar-label {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .toolbar-control,
        .favorite-toggle {
            min-height: 44px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-main);
            font: inherit;
        }

        .toolbar-control {
            padding: 0 13px;
        }

        .toolbar-control:focus,
        .favorite-toggle:focus-visible,
        .filter-chip:focus-visible,
        .favorite-button:focus-visible {
            outline: 2px solid var(--accent-blue-bright);
            outline-offset: 2px;
        }

        .sort-control option {
            background: #1c1c1e;
            color: #fff;
        }

        .favorite-toggle {
            padding: 0 16px;
            cursor: pointer;
            white-space: nowrap;
        }

        .favorite-toggle[aria-pressed="true"] {
            border-color: rgba(255, 69, 58, 0.7);
            background: rgba(255, 69, 58, 0.14);
            color: #ff8a84;
        }

        .favorite-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .clear-favorites {
            border: 0;
            padding: 6px 2px;
            background: transparent;
            color: var(--text-muted);
            font: inherit;
            font-size: 12px;
            cursor: pointer;
        }

        .clear-favorites:hover {
            color: #ff8a84;
        }

        .clear-favorites:disabled {
            display: none;
        }

        .tag-filter-group {
            display: grid;
            grid-template-columns: 105px minmax(0, 1fr);
            gap: 14px;
            align-items: start;
            padding: 14px 18px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        #filter-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-start;
            margin: 0;
            padding: 0;
        }

        .filter-chip {
            min-height: 36px;
            padding: 7px 13px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            font-family: inherit;
        }

        .filter-chip:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .filter-chip.active {
            background: var(--accent-blue);
            color: #fff;
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(41, 151, 255, 0.3);
        }

        /* --- Hero Section --- */
        .header-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            margin-bottom: 0;
            padding-top: 0;
            transition: all 0.5s ease;
        }

        /* --- Search Controls (Default / Hero Mode) --- */
        .search-controls {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 24px 32px;
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .search-controls:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: opacity 0.2s;
        }

        .form-control {
            background: #000;
            border: 1px solid #3a3a3c;
            border-radius: 10px;
            height: 44px;
            padding: 0 14px;
            color: white;
            font-size: 15px;
            width: 260px;
            font-family: inherit;
            transition: all 0.2s;
            cursor: text;
        }

        .date-control {
            width: 170px;
            cursor: pointer;
            color-scheme: dark;
        }

        .date-control::-webkit-calendar-picker-indicator {
            filter: invert(1) brightness(1.25);
            opacity: 0.9;
            cursor: pointer;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: #111;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0a84ff, #0077ed);
            color: #fff;
            height: 44px;
            border: none;
            border-radius: 10px;
            padding: 0 32px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 19px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(10, 132, 255, 0.4);
            white-space: nowrap;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        /* --- Navbar Mode Styles --- */
        .navbar .search-controls {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
            margin-left: 40px;
            gap: 12px;
            transform: none !important;
        }

        .navbar .form-group label {
            display: none;
        }

        .navbar .form-group {
            margin: 0;
        }

        .navbar .form-control {
            height: 36px;
            width: 220px;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            font-size: 13px;
        }

        .navbar .date-control {
            width: 150px;
        }

        .navbar .form-control:focus {
            background: #000;
            border-color: var(--accent-blue);
        }

        .navbar .btn-primary {
            height: 36px;
            padding: 0 20px;
            margin-top: 0;
            font-size: 13px;
            box-shadow: none;
        }

        /* --- Results Grid --- */
        .event-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 28px;
            margin-bottom: 60px;
            margin-top: 30px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .event-grid.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .event-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: var(--radius-main);
            padding: 30px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            min-height: 520px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            animation: cardEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .event-card.is-favorite {
            border-color: rgba(255, 69, 58, 0.55);
        }

        .favorite-button {
            width: 34px;
            height: 34px;
            flex: 0 0 34px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .favorite-button.active {
            border-color: rgba(255, 69, 58, 0.5);
            background: rgba(255, 69, 58, 0.14);
            color: #ff6961;
        }

        .remove-favorite {
            align-self: flex-start;
            border: 1px solid rgba(255, 69, 58, 0.35);
            border-radius: 8px;
            padding: 6px 9px;
            background: rgba(255, 69, 58, 0.08);
            color: #ff8a84;
            font: inherit;
            font-size: 11px;
            cursor: pointer;
        }

        .remove-favorite:hover {
            background: rgba(255, 69, 58, 0.18);
        }

        .title-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .empty-state {
            grid-column: 1 / -1;
            padding: 70px 24px;
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-main);
            color: var(--text-muted);
            text-align: center;
        }

        .error-state {
            color: #ff9f9a;
            border-color: rgba(255, 69, 58, 0.35);
            background: rgba(255, 69, 58, 0.06);
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .event-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--accent-blue-bright);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 113, 227, 0.1);
            background-color: var(--card-bg-hover);
        }

        .card-header {
            margin-bottom: 16px;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .loc-text {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .loc-text i {
            color: var(--accent-red);
            margin-right: 6px;
            font-size: 14px;
        }

        .time-badge {
            font-size: 12px;
            font-weight: 700;
            background: rgba(10, 132, 255, 0.15);
            color: var(--accent-blue);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(10, 132, 255, 0.3);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .date-badge {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .event-title {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.3;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }

        .summary-wrapper {
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .summary-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #636366;
            margin-bottom: 8px;
        }

        .summary-container {
            font-size: 14px;
            line-height: 1.6;
            color: #d1d1d6;
            overflow-y: auto;
            padding-right: 8px;
            max-height: 180px;
        }

        .summary-list {
            list-style: none;
            padding-left: 0;
        }

        .summary-item {
            margin-bottom: 10px;
            position: relative;
            padding-left: 18px;
        }

        .summary-item::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent-blue);
            font-size: 16px;
            line-height: 1.2;
        }

        .summary-container::-webkit-scrollbar {
            width: 4px;
        }

        .summary-container::-webkit-scrollbar-thumb {
            background: #3a3a3c;
            border-radius: 4px;
        }

        .key-points {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .kp-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #8e8e93;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .point-row {
            display: flex;
            align-items: flex-start;
            font-size: 13px;
            color: #fff;
            font-weight: 600;
            line-height: 1.4;
        }

        .point-row i {
            color: var(--accent-blue);
            margin-right: 10px;
            margin-top: 2px;
            font-size: 13px;
            flex-shrink: 0;
        }

        .tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
        }

        .tag-pill {
            font-size: 11px;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid transparent;
        }

        .tag-pill:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        /* Apple Semi-transparent system colors */
        .tag-blue {
            background: rgba(0, 113, 227, 0.15);
            color: #40a9ff;
            border-color: rgba(0, 113, 227, 0.2);
        }

        .tag-purple {
            background: rgba(175, 82, 222, 0.15);
            color: #d68ff6;
            border-color: rgba(175, 82, 222, 0.2);
        }

        .tag-emerald {
            background: rgba(52, 199, 89, 0.15);
            color: #80eb92;
            border-color: rgba(52, 199, 89, 0.2);
        }

        .tag-indigo {
            background: rgba(88, 86, 214, 0.15);
            color: #9a98f0;
            border-color: rgba(88, 86, 214, 0.2);
        }

        .tag-amber {
            background: rgba(255, 159, 10, 0.15);
            color: #ffbc52;
            border-color: rgba(255, 159, 10, 0.2);
        }

        .tag-rose {
            background: rgba(255, 45, 85, 0.15);
            color: #ff708d;
            border-color: rgba(255, 45, 85, 0.2);
        }

        .tag-cyan {
            background: rgba(100, 210, 255, 0.15);
            color: #94e2ff;
            border-color: rgba(100, 210, 255, 0.2);
        }

        .tag-lime {
            background: rgba(191, 255, 0, 0.12);
            color: #d8ff70;
            border-color: rgba(191, 255, 0, 0.2);
        }

        .tag-pink {
            background: rgba(255, 45, 174, 0.15);
            color: #ff85cc;
            border-color: rgba(255, 45, 174, 0.2);
        }

        .tag-teal {
            background: rgba(100, 210, 255, 0.12);
            color: #64d2ff;
            border: 1px solid rgba(100, 210, 255, 0.2);
        }

        .card-footer {
            padding-top: 16px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rsvp-stat {
            font-size: 13px;
            font-weight: 650;
            color: #8fa7bd;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .rsvp-stat i {
            margin-right: 0;
            color: #6f8da8;
            font-size: 14px;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 100px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-action:hover {
            background: #fff;
            color: #000;
        }

        #loader {
            display: none;
            margin: 100px 0;
            text-align: center;
        }

        .spinner {
            width: 64px;
            height: 64px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--accent-blue);
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            box-shadow: 0 0 20px rgba(10, 132, 255, 0.2);
        }

        .loading-text {
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        /* --- Responsive Design --- */
        @media (max-width: 1000px) {
            .event-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 768px) {
            :root {
                --card-w: 100%;
            }

            .results-controls,
            .controls-primary,
            .tag-filter-group,
            .toolbar-field,
            .toolbar-control {
                width: 100%;
                box-sizing: border-box;
            }

            .toolbar-control {
                min-width: 0;
            }

            .navbar {
                flex-wrap: wrap;
                height: auto;
                padding: 12px 20px;
            }

            .navbar .search-controls {
                margin-left: 0;
                width: 100%;
                margin-top: 12px;
                padding-bottom: 4px;
                order: 3;
            }

            .navbar .form-control,
            .navbar .date-control,
            .navbar .btn-primary {
                width: 100%;
            }

            .search-controls {
                flex-direction: column;
                width: 100%;
                align-items: stretch;
                padding: 24px;
            }

            .form-control {
                width: 100%;
            }

            .event-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .controls-primary {
                grid-template-columns: 1fr 1fr;
            }

            .toolbar-field:first-child {
                grid-column: 1 / -1;
            }

            .tag-filter-group {
                grid-template-columns: 1fr;
                gap: 9px;
            }

            .hero-logo-text {
                font-size: 48px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 12px 16px;
            }

            .brand-container {
                gap: 8px;
            }

            .navbar-brand {
                font-size: 18px;
            }

            .header-section {
                min-height: 60vh;
                padding: 0 16px;
            }

            .hero-logo-container {
                flex-direction: column;
                gap: 16px;
                margin-bottom: 32px;
                text-align: center;
            }

            .hero-logo-box {
                width: 64px;
                height: 64px;
                border-radius: 16px;
            }

            .hero-logo-iris {
                width: 32px;
                height: 32px;
                border-width: 3px;
            }

            .hero-logo-iris::after {
                width: 10px;
                height: 10px;
                top: 3px;
                left: 3px;
            }

            .hero-logo-text {
                font-size: 36px;
            }

            .main-content {
                padding: 20px 16px 60px;
            }

            .controls-primary {
                grid-template-columns: 1fr;
            }

            .toolbar-field:first-child {
                grid-column: auto;
            }

            .results-controls {
                border-radius: 14px;
            }

            .controls-primary,
            .tag-filter-group {
                padding-left: 14px;
                padding-right: 14px;
            }

            .tag-filter-group {
                gap: 7px;
                padding-bottom: 12px;
            }

            #filter-wrapper {
                flex-wrap: nowrap;
                overflow-x: auto;
                overscroll-behavior-x: contain;
                scroll-snap-type: x proximity;
                margin: 0 -14px;
                padding: 0 14px 4px;
                scrollbar-width: thin;
            }

            .filter-chip {
                flex: 0 0 auto;
                min-height: 44px;
                scroll-snap-align: start;
            }

            #listing-count {
                flex: 0 1 auto;
                padding: 7px 10px;
                font-size: 11px;
                letter-spacing: 0.04em;
                white-space: nowrap;
            }

            .favorite-toggle {
                padding: 0 12px;
            }

            .search-controls {
                padding: 20px 16px;
            }

            .form-group label {
                font-size: 10px;
            }

            .event-card {
                padding: 20px;
                min-height: auto;
            }

            .event-title {
                font-size: 20px;
            }

            .summary-container {
                max-height: 156px;
                padding-right: 5px;
                overscroll-behavior: contain;
            }

            .card-footer {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
                text-align: center;
            }

            .rsvp-stat {
                justify-content: center;
            }

            .btn-action {
                min-height: 44px;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow">
        <div class="bg-orb"></div>
    </div>
    <div class="grid-overlay"></div>
    <nav class="navbar" id="navbar">
        <a href="/" class="brand-container">
            <div class="logo-box">
                <div class="logo-iris"></div>
            </div>
            <span class="navbar-brand">LumaScope</span>
        </a>
        <!-- Search form moves here -->
    </nav>

    <main class="main-content">
        <div class="header-section" id="initial-header">
            <div class="hero-logo-container">
                <div class="hero-logo-box">
                    <div class="hero-logo-iris"></div>
                </div>
                <h1 class="hero-logo-text">LumaScope</h1>
            </div>
            <form id="scrape-form" class="search-controls">
                <div class="form-group">
                    <label>URL</label>
                    <input type="url" name="url" class="form-control" required placeholder="https://lu.ma/...">
                </div>
                <div class="form-group">
                    <label>From</label>
                    <input type="date" name="date_from" id="date-from-input" class="form-control date-control" required
                        onclick="if(this.showPicker) this.showPicker()">
                </div>
                <div class="form-group">
                    <label>To</label>
                    <input type="date" name="date_to" id="date-to-input" class="form-control date-control" required
                        onclick="if(this.showPicker) this.showPicker()">
                </div>
                <button type="submit" class="btn btn-primary" id="submit-btn">Search</button>
            </form>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <p class="loading-text">Analyzing Events...</p>
        </div>

        <div id="results-container" style="display: none;">
            <section class="results-controls" id="results-controls" aria-label="Event controls">
                <div class="controls-primary">
                    <label class="toolbar-field">
                        <span class="toolbar-label">Search events</span>
                        <input id="event-search" class="toolbar-control" type="search"
                            placeholder="Title, location, summary, or tag">
                    </label>
                    <label class="toolbar-field">
                        <span class="toolbar-label">Sort by</span>
                        <select id="event-sort" class="toolbar-control sort-control">
                            <option value="relevance">Relevance</option>
                            <option value="time">Start time</option>
                            <option value="rsvp">RSVP count</option>
                            <option value="title">Title</option>
                        </select>
                    </label>
                </div>
                <div class="tag-filter-group">
                    <span class="toolbar-label">Filter tags</span>
                    <div id="filter-wrapper"></div>
                </div>
            </section>
            <div class="listing-info" id="results-info">
                <span id="listing-count" aria-live="polite"></span>
                <div class="favorite-actions">
                    <button id="favorites-only" class="favorite-toggle" type="button" aria-pressed="false">
                        <i class="bi bi-heart" aria-hidden="true"></i>
                        <span>Favorites (0)</span>
                    </button>
                    <button id="clear-favorites" class="clear-favorites" type="button" disabled>Clear all</button>
                </div>
            </div>
            <div class="ui-divider" id="results-divider"></div>
            <div class="event-grid" id="event-list"></div>
        </div>
    </main>

    <script>
        const now = new Date();
        const localDate = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        const dateFromInput = document.getElementById('date-from-input');
        const dateToInput = document.getElementById('date-to-input');
        dateFromInput.value = localDate;
        dateToInput.value = localDate;

        const form = document.getElementById('scrape-form');
        const loader = document.getElementById('loader');
        const resultsContainer = document.getElementById('results-container');
        const eventList = document.getElementById('event-list');
        const resultsControls = document.getElementById('results-controls');
        const resultsInfo = document.getElementById('results-info');
        const resultsDivider = document.getElementById('results-divider');
        const submitBtn = document.getElementById('submit-btn');
        const navbar = document.getElementById('navbar');
        const initialHeader = document.getElementById('initial-header');
        const filterWrapper = document.getElementById('filter-wrapper');
        const listingCount = document.getElementById('listing-count');
        const eventSearch = document.getElementById('event-search');
        const eventSort = document.getElementById('event-sort');
        const favoritesOnlyButton = document.getElementById('favorites-only');
        const clearFavoritesButton = document.getElementById('clear-favorites');
        const FAVORITES_KEY = 'lumascope-favorites-v1';
        const tagColors = ['tag-blue', 'tag-purple', 'tag-emerald', 'tag-indigo', 'tag-amber', 'tag-rose', 'tag-cyan', 'tag-lime', 'tag-pink', 'tag-teal'];

        let allEvents = [];
        let allTags = [];
        let activeTags = new Set();
        let favoritesOnly = false;
        let isMultiDaySearch = false;
        let favoriteRecords = loadFavorites();
        let favoriteIds = new Set(favoriteRecords.keys());

        function loadFavorites() {
            try {
                const stored = JSON.parse(localStorage.getItem(FAVORITES_KEY) || '[]');
                if (!Array.isArray(stored)) return new Map();
                return new Map(stored.map(item => {
                    const record = typeof item === 'string' ? { id: item, title: 'Saved event' } : item;
                    return [eventId(record), record];
                }).filter(([id, record]) => id && record && typeof record === 'object'));
            } catch {
                return new Map();
            }
        }

        function saveFavorites() {
            try {
                localStorage.setItem(FAVORITES_KEY, JSON.stringify([...favoriteRecords.values()]));
            } catch (error) {
                console.warn('Could not save favorites.', error);
            }
        }

        function eventId(event) {
            return String(event.id || event.url || event.title);
        }

        function stringList(value) {
            if (Array.isArray(value)) return value.filter(item => typeof item === 'string' && item.trim()).map(item => item.trim());
            if (typeof value === 'string' && value.trim()) return [value.trim()];
            return [];
        }

        function createElement(tag, className, text) {
            const element = document.createElement(tag);
            if (className) element.className = className;
            if (text !== undefined) element.textContent = text;
            return element;
        }

        function createIcon(name) {
            const icon = createElement('i', `bi ${name}`);
            icon.setAttribute('aria-hidden', 'true');
            return icon;
        }

        function safeEventUrl(value) {
            try {
                const url = new URL(value);
                const supportedHost = url.hostname === 'lu.ma' || url.hostname.endsWith('.lu.ma') ||
                    url.hostname === 'luma.com' || url.hostname.endsWith('.luma.com');
                return url.protocol === 'https:' && supportedHost ? url.href : null;
            } catch {
                return null;
            }
        }

        function formatEventDateTime(event) {
            const startAt = new Date(event.start_date);
            const endAt = event.end_date ? new Date(event.end_date) : null;
            if (Number.isNaN(startAt.getTime())) return 'Time TBD';

            const options = event.timezone ? { timeZone: event.timezone } : {};
            try {
                const formatTime = value => value.toLocaleTimeString([], {
                    ...options,
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true,
                }).replace(/^0/, '');
                const startTime = formatTime(startAt);
                const endTime = endAt && !Number.isNaN(endAt.getTime()) ? `–${formatTime(endAt)}` : '';
                const zonePart = new Intl.DateTimeFormat([], {
                    ...options,
                    timeZoneName: 'short',
                }).formatToParts(startAt).find(part => part.type === 'timeZoneName');
                const zone = zonePart ? ` ${zonePart.value}` : '';
                return `${startTime}${endTime}${zone}`;
            } catch {
                return startAt.toLocaleTimeString();
            }
        }

        function formatEventDate(event) {
            const startAt = new Date(event.start_date);
            if (Number.isNaN(startAt.getTime())) return '';
            const options = event.timezone ? { timeZone: event.timezone } : {};
            try {
                return startAt.toLocaleDateString([], { ...options, month: 'short', day: 'numeric' });
            } catch {
                return startAt.toLocaleDateString([], { month: 'short', day: 'numeric' });
            }
        }

        function tagColor(tag) {
            let hash = 0;
            const cleanTag = tag.toLowerCase().trim();
            for (let index = 0; index < cleanTag.length; index++) {
                hash = cleanTag.charCodeAt(index) + ((hash << 5) - hash);
            }
            return tagColors[Math.abs(hash) % tagColors.length];
        }

        function updateFavoritesButton() {
            favoritesOnlyButton.setAttribute('aria-pressed', String(favoritesOnly));
            favoritesOnlyButton.querySelector('i').className = `bi ${favoritesOnly ? 'bi-heart-fill' : 'bi-heart'}`;
            favoritesOnlyButton.querySelector('span').textContent = `Favorites (${favoriteIds.size})`;
            clearFavoritesButton.disabled = favoriteIds.size === 0;
        }

        function renderTagFilters() {
            filterWrapper.replaceChildren();
            const allButton = createElement('button', `filter-chip${activeTags.size === 0 ? ' active' : ''}`, 'All Events');
            allButton.type = 'button';
            allButton.setAttribute('aria-pressed', String(activeTags.size === 0));
            allButton.addEventListener('click', () => {
                activeTags.clear();
                renderTagFilters();
                renderEvents();
            });
            filterWrapper.appendChild(allButton);

            allTags.forEach(tag => {
                const isActive = activeTags.has(tag);
                const button = createElement('button', `filter-chip${isActive ? ' active' : ''}`, tag);
                button.type = 'button';
                button.setAttribute('aria-pressed', String(isActive));
                button.addEventListener('click', () => {
                    if (activeTags.has(tag)) activeTags.delete(tag);
                    else activeTags.add(tag);
                    renderTagFilters();
                    renderEvents();
                });
                filterWrapper.appendChild(button);
            });
        }

        function searchText(event) {
            return [
                event.title,
                event.location,
                event.description,
                ...stringList(event.ai_summary),
                ...stringList(event.tags),
            ].filter(Boolean).join(' ').toLowerCase();
        }

        function relevanceScore(event, query) {
            if (!query) return 0;
            const title = String(event.title || '').toLowerCase();
            const tags = stringList(event.tags).join(' ').toLowerCase();
            const body = searchText(event);
            return (title.includes(query) ? 8 : 0) + (tags.includes(query) ? 4 : 0) +
                (body.split(query).length - 1);
        }

        function filteredAndSortedEvents() {
            const query = eventSearch.value.trim().toLowerCase();
            const sourceEvents = favoritesOnly ? [...favoriteRecords.values()] : allEvents;
            const filtered = sourceEvents.filter(event => {
                const tags = new Set(stringList(event.tags));
                const matchesTags = [...activeTags].every(tag => tags.has(tag));
                const matchesSearch = !query || searchText(event).includes(query);
                const matchesFavorites = !favoritesOnly || favoriteIds.has(eventId(event));
                return matchesTags && matchesSearch && matchesFavorites;
            });

            return filtered.sort((left, right) => {
                if (eventSort.value === 'time') {
                    return (new Date(left.start_date).getTime() || Infinity) - (new Date(right.start_date).getTime() || Infinity);
                }
                if (eventSort.value === 'rsvp') {
                    return Number(right.guest_count || 0) - Number(left.guest_count || 0);
                }
                if (eventSort.value === 'title') {
                    return String(left.title || '').localeCompare(String(right.title || ''));
                }
                const scoreDifference = relevanceScore(right, query) - relevanceScore(left, query);
                return scoreDifference || left._sourceIndex - right._sourceIndex;
            });
        }

        function toggleFavorite(event) {
            const id = eventId(event);
            if (favoriteIds.has(id)) {
                favoriteIds.delete(id);
                favoriteRecords.delete(id);
            } else {
                favoriteIds.add(id);
                favoriteRecords.set(id, { ...event });
            }
            saveFavorites();
            updateFavoritesButton();
            renderEvents();
        }

        function clearFavorites() {
            favoriteIds.clear();
            favoriteRecords.clear();
            saveFavorites();
            updateFavoritesButton();
            renderEvents();
        }

        function removeFavorite(event) {
            const id = eventId(event);
            if (!favoriteIds.has(id)) return;
            favoriteIds.delete(id);
            favoriteRecords.delete(id);
            saveFavorites();
            updateFavoritesButton();
            renderEvents();
        }

        function buildEventCard(event, index) {
            const card = createElement('article', `event-card${favoriteIds.has(eventId(event)) ? ' is-favorite' : ''}`);
            const eventUrl = safeEventUrl(event.url);
            card.style.animationDelay = `${Math.min(index, 12) * 0.05}s`;

            if (eventUrl) {
                card.tabIndex = 0;
                card.addEventListener('click', clickEvent => {
                    if (!clickEvent.target.closest('a, button')) window.open(eventUrl, '_blank', 'noopener,noreferrer');
                });
                card.addEventListener('keydown', keyEvent => {
                    if ((keyEvent.key === 'Enter' || keyEvent.key === ' ') && keyEvent.target === card) {
                        keyEvent.preventDefault();
                        window.open(eventUrl, '_blank', 'noopener,noreferrer');
                    }
                });
            }

            const header = createElement('div', 'card-header');
            const meta = createElement('div', 'meta-row');
            const location = createElement('span', 'loc-text');
            location.append(createIcon('bi-geo-alt-fill'), document.createTextNode(String(event.location || 'Location TBD').split(',')[0]));
            meta.appendChild(location);
            if (isMultiDaySearch) {
                const eventDate = formatEventDate(event);
                if (eventDate) meta.appendChild(createElement('span', 'date-badge', eventDate));
            }
            meta.appendChild(createElement('span', 'time-badge', formatEventDateTime(event)));

            const titleRow = createElement('div', 'title-row');
            titleRow.appendChild(createElement('h3', 'event-title', event.title || 'Untitled Event'));
            const favoriteButton = createElement('button', `favorite-button${favoriteIds.has(eventId(event)) ? ' active' : ''}`);
            favoriteButton.type = 'button';
            const isFavorite = favoriteIds.has(eventId(event));
            const favoriteAction = isFavorite ? 'Remove from' : 'Add to';
            favoriteButton.setAttribute('aria-label', `${favoriteAction} favorites: ${event.title || 'event'}`);
            favoriteButton.title = `${favoriteAction} favorites`;
            favoriteButton.appendChild(createIcon(isFavorite ? 'bi-heart-fill' : 'bi-heart'));
            favoriteButton.addEventListener('click', () => toggleFavorite(event));
            titleRow.appendChild(favoriteButton);
            if (favoritesOnly && isFavorite) {
                const removeButton = createElement('button', 'remove-favorite', 'Remove');
                removeButton.type = 'button';
                removeButton.setAttribute('aria-label', `Remove ${event.title || 'event'} from favorites`);
                removeButton.addEventListener('click', () => removeFavorite(event));
                titleRow.appendChild(removeButton);
            }
            header.append(meta, titleRow);
            card.appendChild(header);

            const summaryWrapper = createElement('div', 'summary-wrapper');
            summaryWrapper.appendChild(createElement('div', 'summary-label', 'Summary'));
            const summaryContainer = createElement('div', 'summary-container');
            let summaries = stringList(event.ai_summary);
            if (summaries.length === 1) {
                summaries = summaries[0].split(/\n+/).map(point => point.replace(/^[-•*]\s*/, '').trim()).filter(Boolean);
            }
            summaries = [...new Set(summaries)].slice(0, 5);
            if (summaries.length) {
                const list = createElement('ul', 'summary-list');
                summaries.forEach(point => list.appendChild(createElement('li', 'summary-item', point)));
                summaryContainer.appendChild(list);
            } else {
                summaryContainer.appendChild(createElement('p', '', 'No summary available.'));
            }
            summaryWrapper.appendChild(summaryContainer);
            card.appendChild(summaryWrapper);

            const reasons = stringList(event.top_reasons).slice(0, 3);
            if (reasons.length) {
                const keyPoints = createElement('div', 'key-points');
                keyPoints.appendChild(createElement('div', 'kp-label', 'Why Attend'));
                reasons.forEach(reason => {
                    const row = createElement('div', 'point-row');
                    row.append(createIcon('bi-check2-circle'), createElement('span', '', reason));
                    keyPoints.appendChild(row);
                });
                card.appendChild(keyPoints);
            }

            const tagsRow = createElement('div', 'tags-row');
            stringList(event.tags).slice(0, 8).forEach(tag => {
                tagsRow.appendChild(createElement('span', `tag-pill ${tagColor(tag)}`, tag));
            });
            card.appendChild(tagsRow);

            const footer = createElement('div', 'card-footer');
            const rsvp = createElement('span', 'rsvp-stat');
            rsvp.append(createIcon('bi-people-fill'), document.createTextNode(` ${Number(event.guest_count || 0)} RSVPs`));
            footer.appendChild(rsvp);
            if (eventUrl) {
                const link = createElement('a', 'btn-action', 'View Event');
                link.href = eventUrl;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
                footer.appendChild(link);
            }
            card.appendChild(footer);
            return card;
        }

        function renderEvents() {
            eventList.classList.remove('visible');
            const events = filteredAndSortedEvents();
            const hasEvents = allEvents.length > 0;
            resultsControls.hidden = !hasEvents;
            resultsInfo.hidden = !hasEvents;
            resultsDivider.hidden = !hasEvents;
            eventList.replaceChildren();
            listingCount.textContent = `${events.length} ${events.length === 1 ? 'Event' : 'Events'} Found`;

            if (!events.length) {
                const message = allEvents.length
                    ? 'No events match the current search and filters.'
                    : 'No events found for this date. Try another date or calendar.';
                eventList.appendChild(createElement('div', 'empty-state', message));
            } else {
                const fragment = document.createDocumentFragment();
                events.forEach((event, index) => fragment.appendChild(buildEventCard(event, index)));
                eventList.appendChild(fragment);
            }
            requestAnimationFrame(() => eventList.classList.add('visible'));
        }

        function renderError(message) {
            resultsControls.hidden = true;
            resultsInfo.hidden = true;
            resultsDivider.hidden = true;
            eventList.replaceChildren();
            eventList.appendChild(createElement('div', 'empty-state error-state', message));
            resultsContainer.style.display = 'block';
            requestAnimationFrame(() => eventList.classList.add('visible'));
        }

        eventSearch.addEventListener('input', renderEvents);
        eventSort.addEventListener('change', renderEvents);
        favoritesOnlyButton.addEventListener('click', () => {
            favoritesOnly = !favoritesOnly;
            updateFavoritesButton();
            renderEvents();
        });
        clearFavoritesButton.addEventListener('click', clearFavorites);
        dateFromInput.addEventListener('change', () => {
            dateToInput.min = dateFromInput.value;
            if (dateToInput.value < dateFromInput.value) dateToInput.value = dateFromInput.value;
        });
        updateFavoritesButton();

        form.onsubmit = async (event) => {
            event.preventDefault();
            isMultiDaySearch = dateFromInput.value !== dateToInput.value;
            navbar.classList.add('visible');

            if (form.parentNode !== navbar) {
                initialHeader.style.opacity = '0';
                initialHeader.style.height = '0';
                initialHeader.style.margin = '0';
                initialHeader.style.overflow = 'hidden';
                initialHeader.style.minHeight = '0';
                navbar.appendChild(form);
                submitBtn.textContent = 'Go';
            }

            loader.style.display = 'block';
            resultsContainer.style.display = 'none';
            eventList.classList.remove('visible');
            submitBtn.disabled = true;
            eventList.replaceChildren();

            try {
                const response = await fetch('/scrape', { method: 'POST', body: new FormData(form) });
                const result = await response.json();
                if (result.status !== 'success') throw new Error(result.message || 'Unknown error occurred.');

                // The backend already applies the requested inclusive date range.
                // Keep past/current events when the user explicitly searches those dates.
                allEvents = (Array.isArray(result.data) ? result.data : [])
                    .map((item, index) => ({ ...item, _sourceIndex: index }));
                allEvents.forEach(item => {
                    const id = eventId(item);
                    if (favoriteIds.has(id)) favoriteRecords.set(id, { ...item });
                });
                saveFavorites();
                allTags = [...new Set(allEvents.flatMap(item => stringList(item.tags)))].sort((left, right) => left.localeCompare(right));
                activeTags.clear();
                favoritesOnly = false;
                eventSearch.value = '';
                eventSort.value = 'relevance';
                updateFavoritesButton();
                renderTagFilters();
                renderEvents();
                resultsContainer.style.display = 'block';
            } catch (error) {
                console.error(error);
                allEvents = [];
                renderError(error.message || 'Unable to load events.');
            } finally {
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        };
    </script>
</body>

</html>
